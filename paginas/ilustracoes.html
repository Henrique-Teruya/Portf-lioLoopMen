<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoopMen - Ilustrações</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <header class="header">
        <div class="container header-content">
            <div class="header-text">
                <h1 class="Titulo">Ilustrações</h1>
                <p class="Subtitulo">Artes</p>
            </div>
            <!-- Menu mobile ou ícone de menu (hambúrguer) pode ser adicionado aqui conforme o figma -->
            <div class="menu-icon">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Grid de Artes -->
        <section class="grid-ilustracoes">
            <div class="ilustracao-item">
                <img src="../midia/imagens/DJ Dog.jpg" alt="DJ Dog">
            </div>
            <div class="ilustracao-item">
                <img src="../midia/imagens/loopmen.jpg" alt="LoopMen">
            </div>
            <div class="ilustracao-item">
                <img src="../midia/imagens/cinco.jpg" alt="Cinco">
            </div>
            <div class="ilustracao-item">
                <img src="../midia/imagens/Folhito jpg.jpg" alt="Folhito">
            </div>
            <div class="ilustracao-item">
                <img src="../midia/imagens/loopbomb.jpeg" alt="LoopBomb">
            </div>
            <div class="ilustracao-item">
                <img src="../midia/imagens/rato.jpeg" alt="Rato">
            </div>
        </section>

        <!-- Seção Estampas -->
        <section class="section-estampas">
            <div class="header-text">
                <h1 class="Titulo">Ilustrações</h1>
                <p class="Subtitulo">Estampas</p>
            </div>

            <section class="grid-ilustracoes">
                <div class="ilustracao-item">
                    <img src="../midia/imagens/estanpa das costas.png" alt="Estampa das costas">
                </div>
                <div class="ilustracao-item">
                    <img src="../midia/imagens/LOGO BRANCA.png" alt="Estampa das costas">
                </div>
                <div class="ilustracao-item">
                    <img src="../midia/imagens/estampa frente.png" alt="Estampa das costas">
                </div>
                <div class="ilustracao-item">
                    <img src="../midia/imagens/banner-removebg-preview.png" alt="Estampa das costas">
                </div>
                <div class="ilustracao-item">
                    <img src="../midia/imagens/Gemini_Generated_Image_ciox3iciox3iciox-removebg-preview.png"
                        alt="Estampa das costas">
                </div>
                <div class="ilustracao-item">
                    <img src="../midia/imagens/estampa da frente azul.png" alt="Estampa das costas">
                </div>
            </section>
        </section>
    </main>

    <!-- Navegação Inferior -->
    <footer class="footer-nav">
        <div class="container nav-container">
            <a href="index.html" class="nav-arrow prev">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </a>
            <div class="nav-dots">
                <span class="dot active"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
            <a href="#" class="nav-arrow next">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </a>
        </div>
    </footer>

    <script src="../js/script.js"></script>
</body>

</html>
